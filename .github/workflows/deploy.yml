name: Deploy main to davtor1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: davtor1-production
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: davtor1
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nicemd/sverigeklattraren:${{ github.sha }}
            ghcr.io/nicemd/sverigeklattraren:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DAVTOR1_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DAVTOR1_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/davtor1"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/davtor1" "$HOME/.ssh/known_hosts"

      - name: Pull main and deploy on davtor1
        env:
          DAVTOR1_HOST: ${{ secrets.DAVTOR1_HOST }}
          DAVTOR1_USER: ${{ secrets.DAVTOR1_USER }}
          IMAGE_REF: ghcr.io/nicemd/sverigeklattraren:${{ github.sha }}
        run: |
          ssh -i "$HOME/.ssh/davtor1" -o IdentitiesOnly=yes "$DAVTOR1_USER@$DAVTOR1_HOST" "deploy $IMAGE_REF"

      - name: Verify private endpoint
        env:
          DAVTOR1_HOST: ${{ secrets.DAVTOR1_HOST }}
          DAVTOR1_USER: ${{ secrets.DAVTOR1_USER }}
        run: |
          ssh -i "$HOME/.ssh/davtor1" -o IdentitiesOnly=yes "$DAVTOR1_USER@$DAVTOR1_HOST" "verify"
