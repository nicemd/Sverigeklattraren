name: Build application image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: application-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_application_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nicemd/sverigeklattraren:${{ github.sha }}
            ghcr.io/nicemd/sverigeklattraren:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
