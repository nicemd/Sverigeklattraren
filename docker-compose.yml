services:
  web:
    image: ${GHCR_IMAGE:-ghcr.io/nicemd/sverigeforaren:latest}
    container_name: sverigeforaren
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      REPOSITORY_ROOT: /repository
    ports:
      - "127.0.0.1:${LOCAL_BIND_PORT:-3086}:3000"
    volumes:
      - ./repository:/repository
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
