services:
  web:
    image: ${GHCR_IMAGE:-ghcr.io/nicemd/sverigeklattraren:latest}
    container_name: sverigeklattraren
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      REPOSITORY_ROOT: /repository
      GITHUB_REPOSITORY: nicemd/Sverigeklattraren
      GITHUB_PROPOSAL_KEY_PATH: /run/secrets/github-proposal-key
    ports:
      - "127.0.0.1:${LOCAL_BIND_PORT:-3086}:3000"
    volumes:
      - ./repository:/repository:ro
      - ./github-proposal-key:/run/secrets/github-proposal-key:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
